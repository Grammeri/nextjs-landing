name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      # Enable pnpm
      - name: Enable pnpm via corepack
        run: corepack enable

      # Install deps
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 🔹 Generate Prisma Client (ВАЖНО)
      - name: Generate Prisma Client
        run: pnpm prisma generate

      # Lint
      - name: Run linter
        run: pnpm lint

      # Type check (отдельно, чтобы ловить ошибки раньше билда)
      - name: Run TypeScript
        run: pnpm tsc --noEmit

      # Build
      - name: Build project
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
        run: pnpm build
